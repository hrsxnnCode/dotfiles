# Police
font_family      JetBrains Mono Nerd Font
font_size        12

# Transparence (équivalent alpha=0.78)
background_opacity 0.78

# Padding (équivalent pad=25x25)
window_padding_width 25

# Curseur beam
cursor_shape beam
cursor_beam_thickness 1.5
shell_integration no-cursor

# Cursor trail (smear)
cursor_trail 3
cursor_trail_decay 0.1 0.4

# Scrollback (équivalent lines=10000)
scrollback_lines 10000

# Pas de confirmation à la fermeture
confirm_os_window_close 0

# Tab bar cachée
tab_bar_style hidden

# Shell
shell fish
